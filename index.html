<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Soccer DX Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { display: block; }

        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        /* Joystick */
        #joystick-container {
            position: absolute; bottom: 30px; left: 30px;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0// --- BANDEIRA DO BRASIL NA ÁREA ---.15);
            border: 3px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: auto; touch-action: none;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #joystick-knob {
            position: absolute; top: 40px; left: 40px;
            width: 40px; height: 40px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Botão de Chute */
        #kick-button {
            position: absolute; bottom: 40px; right: 40px;
            width: 90px; height: 90px;
            background: linear-gradient(#ff4444, #cc0000);
            border: 5px solid #fff;
            border-radius: 50%; 
            color: white; 
            font-weight: bold;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; 
            user-select: none;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6);
        }
        #kick-button:active { transform: scale(0.9); }

        #score-board {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 32px; font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            background: rgba(0,0,0,0.4);
            padding: 8px 30px;
            border-radius: 50px;
        }

        #goal-msg {
            display: none; position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            color: #ffff00; font-size: 90px; font-weight: 900;
            text-shadow: 6px 6px 10px #000;
            animation: goalAnim 0.6s infinite alternate;
            pointer-events: none;
            white-space: nowrap;
        }
        @keyframes goalAnim { 
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0.7; }
            to { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
    </style>
</head>

function adicionarGrafismo(x, z, largura, altura, cor, rotacao = 0) {
    const geo = new THREE.PlaneGeometry(largura, altura);
    const mat = new THREE.MeshPhongMaterial({ 
        color: cor, 
        transparent: true, 
        opacity: 0.6, // Deixa a arte levemente transparente para mesclar com o chão
        side: THREE.DoubleSide 
    });
    const desenho = new THREE.Mesh(geo, mat);
    
    desenho.position.set(x, 0.12, z); // Elevado 0.12 para ficar logo acima do chão
    desenho.rotation.x = -Math.PI / 2;
    desenho.rotation.z = rotacao;
    artGroup.add(desenho);
}

// Exemplos de desenhos freestyle (formas geométricas e linhas)

function criarTorcedor(x, z) {
    const fan = new THREE.Group();

    const fanShirt = new THREE.MeshPhongMaterial({ 
        color: [0xff0000, 0x0000ff, 0xffffff, 0xffff00][Math.floor(Math.random() * 4)]

    const fBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.0, 0.4), fanShirt);

    fHead.position.y = 1.9;
    
    // Braços levantados (comemorando)

    const fArmR = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.7, 0.2), fanSkin);

    fArmR.position.set(0.5, 1.5, 0); fArmR.rotation.z = -0.8;

    fan.add(fBody, fHead, fArmL, fArmR);
    fan.position.set(x, 0, z);

        // Controles (mesmo de antes)
        let moveInput = { x: 0, z: 0 };
        const knob = document.getElementById('joystick-knob');
        const joystickContainer = document.getElementById('joystick-container');
        let isDragging = false;

        joystickContainer.addEventListener('pointerdown', (e) => { isDragging = true; updateJoystick(e); });
        window.addEventListener('pointermove', (e) => { if (isDragging) updateJoystick(e); });
        window.addEventListener('pointerup', () => {
            isDragging = false;
            moveInput = { x: 0, z: 0 };
            knob.style.transform = `translate(0px, 0px)`;
        });

        function updateJoystick(e) {
            const rect = joystickContainer.getBoundingClientRect();
            const dx = e.clientX - (rect.left + 60);
            const dy = e.clientY - (rect.top + 60);
            const dist = Math.min(Math.hypot(dx, dy), 45);
            const angle = Math.atan2(dy, dx);

            moveInput.x = Math.cos(angle) * (dist / 45);
            moveInput.z = Math.sin(angle) * (dist / 45);

            knob.style.transform = `translate(${moveInput.x * 45}px, ${moveInput.z * 45}px)`;
        }

        // Chute
        document.getElementById('kick-button').addEventListener('pointerdown', () => {
            if (isCelebrating) return;
            const dist = player.position.distanceTo(ball.position);
            if (dist < 3) {
                const direction = new THREE.Vector3(
                    ball.position.x - player.position.x,
                    0,
                    ball.position.z - player.position.z - 3
                ).normalize();
                ballVel.copy(direction).multiplyScalar(1.4);
                ballVel.y = 0.55;
            }
        });

                    const legSwing = Math.sin(t * walkSpeed) * 0.9;
                    const armSwing = Math.sin(t * walkSpeed) * 0.85;

                    // Pernas (mais natural)
                    lLeg.rotation.x = legSwing;
                    rLeg.rotation.x = -legSwing;

                    // Braços balançando no sentido oposto (muito mais realista)
                    lArm.rotation.x = -armSwing;
                    rArm.rotation.x = armSwing;

                    // Leve inclinação do corpo ao correr
                    body.rotation.x = Math.abs(legSwing) * 0.08;
                } else {
                    // Parado = pose relaxada
                    lLeg.rotation.x = rLeg.rotation.x = 0;
                    lArm.rotation.x = rArm.rotation.x = 0.2;   // braços levemente à frente

            }
